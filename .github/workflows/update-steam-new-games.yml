# Update PC.Games.json with New Steam Games
#
# Runs daily and compares the current Steam app catalogue against the existing
# PC.Games.json in Koriebonx98/Games.Database.  Any Steam game not already
# present (matched by AppID) is appended with its:
#   • Title         – game name
#   • TitleID       – Steam AppID (string)
#   • appid         – Steam AppID (integer)
#   • image         – Steam CDN header art  (header.jpg, 460×215)
#   • stores[0].url – Steam store page URL
#
# If no new games are found the workflow exits cleanly without committing.
#
# Triggers:
#   • Daily   – every day at 04:00 UTC
#   • Manual  – workflow_dispatch
#
# Required secret:
#   GAMES_DB_TOKEN  – fine-grained PAT with Contents: Read and write on
#                     Koriebonx98/Games.Database

name: Update Steam New Games

on:
  schedule:
    - cron: "0 4 * * *"   # daily at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    name: Append new Steam games to PC.Games.json
    runs-on: ubuntu-latest

    steps:
      - name: Check for GAMES_DB_TOKEN
        run: |
          if [ -z "${{ secrets.GAMES_DB_TOKEN }}" ]; then
            echo "❌ GAMES_DB_TOKEN secret is not set."
            echo "   Add a fine-grained PAT with Contents: Read and write on"
            echo "   Koriebonx98/Games.Database as the GAMES_DB_TOKEN secret."
            exit 1
          fi
          echo "✅ GAMES_DB_TOKEN is present."

      - name: Fetch Steam catalogue, diff against PC.Games.json, append new games
        env:
          GAMES_DB_TOKEN: ${{ secrets.GAMES_DB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, base64, os, sys
          import urllib.request, urllib.error

          REQUEST_TIMEOUT = 120

          # ── 1. Fetch the current Steam app list ────────────────────────────
          STEAM_LIST_URL = (
              'https://raw.githubusercontent.com/dgibbs64/SteamCMD-AppID-List'
              '/main/steamcmd_appid.json'
          )
          print(f'⬇️  Fetching Steam app list from {STEAM_LIST_URL} …')
          try:
              with urllib.request.urlopen(STEAM_LIST_URL, timeout=REQUEST_TIMEOUT) as resp:
                  steam_data = json.loads(resp.read())
          except Exception as exc:
              print(f'❌ Failed to fetch Steam app list: {exc}')
              sys.exit(1)

          all_apps = steam_data.get('applist', {}).get('apps', [])
          print(f'   Total entries in source list: {len(all_apps)}')

          # ── 2. Filter to actual games ──────────────────────────────────────
          SKIP_KEYWORDS = [
              'dedicated server', ' sdk', 'source sdk', 'soundtrack', ' ost',
              'playtest', 'press review', 'linux client', 'winui', 'steamcmd',
              'steam client', 'tool ', ' tool', 'beta test', 'server beta',
              'dev kit', 'devkit',
          ]

          steam_by_appid = {}   # appid (int) → entry dict
          seen_names     = set()
          for app in all_apps:
              appid = app.get('appid')
              name  = app.get('name', '').strip()
              if not name or appid is None:
                  continue
              name_lower = name.lower()
              if any(kw in name_lower for kw in SKIP_KEYWORDS):
                  continue
              if name_lower in seen_names:
                  continue
              seen_names.add(name_lower)
              steam_by_appid[appid] = {
                  'Title':   name,
                  'TitleID': str(appid),
                  'appid':   appid,
                  'image':   f'https://cdn.akamai.steamstatic.com/steam/apps/{appid}/header.jpg',
                  'stores':  [{'name': 'Steam', 'url': f'https://store.steampowered.com/app/{appid}/'}],
              }

          print(f'   Steam games after filtering: {len(steam_by_appid)}')

          # ── 3. Set up GitHub API helpers ───────────────────────────────────
          token   = os.environ['GAMES_DB_TOKEN']
          owner   = 'Koriebonx98'
          repo    = 'Games.Database'
          path    = 'PC.Games.json'
          api     = f'https://api.github.com/repos/{owner}/{repo}/contents/{path}'
          raw_url = f'https://raw.githubusercontent.com/{owner}/{repo}/main/{path}'

          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
          }

          def get_blob_sha_via_tree(owner, repo, path, headers):
              ref_url = f'https://api.github.com/repos/{owner}/{repo}/git/ref/heads/main'
              with urllib.request.urlopen(
                      urllib.request.Request(ref_url, headers=headers),
                      timeout=REQUEST_TIMEOUT) as r:
                  commit_sha = json.loads(r.read())['object']['sha']
              commit_url = (
                  f'https://api.github.com/repos/{owner}/{repo}/git/commits/{commit_sha}'
              )
              with urllib.request.urlopen(
                      urllib.request.Request(commit_url, headers=headers),
                      timeout=REQUEST_TIMEOUT) as r:
                  tree_sha = json.loads(r.read())['tree']['sha']
              tree_url = (
                  f'https://api.github.com/repos/{owner}/{repo}'
                  f'/git/trees/{tree_sha}?recursive=true'
              )
              with urllib.request.urlopen(
                      urllib.request.Request(tree_url, headers=headers),
                      timeout=REQUEST_TIMEOUT) as r:
                  tree = json.loads(r.read())
              for item in tree.get('tree', []):
                  if item.get('path') == path:
                      return item['sha']
              return None

          def extract_games_arr(data):
              if isinstance(data, dict):
                  return data.get('Games') or data.get('games') or []
              if isinstance(data, list):
                  return data
              return []

          # ── 4. Read existing PC.Games.json ─────────────────────────────────
          existing_sha  = None
          existing_arr  = []
          existing_meta = {}

          req = urllib.request.Request(api, headers=headers)
          try:
              with urllib.request.urlopen(req, timeout=REQUEST_TIMEOUT) as resp:
                  file_meta = json.loads(resp.read())
              existing_sha = file_meta.get('sha')
              if file_meta.get('content'):
                  existing_data = json.loads(
                      base64.b64decode(file_meta['content'].replace('\n', ''))
                  )
              else:
                  with urllib.request.urlopen(
                          file_meta['download_url'], timeout=REQUEST_TIMEOUT) as r:
                      existing_data = json.loads(r.read())
              if isinstance(existing_data, dict):
                  existing_meta = {k: v for k, v in existing_data.items() if k not in ('Games', 'games')}
              existing_arr = extract_games_arr(existing_data)
              print(f'ℹ️  PC.Games.json exists — {len(existing_arr)} games currently stored.')
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print('ℹ️  PC.Games.json does not exist yet — nothing to diff against.')
                  print('   Run the "Seed PC Games Database" workflow first.')
                  sys.exit(0)
              elif e.code == 403:
                  # File too large for Contents API — read via raw URL
                  try:
                      with urllib.request.urlopen(raw_url, timeout=REQUEST_TIMEOUT) as r:
                          existing_data = json.loads(r.read())
                      if isinstance(existing_data, dict):
                          existing_meta = {k: v for k, v in existing_data.items() if k not in ('Games', 'games')}
                      existing_arr = extract_games_arr(existing_data)
                      print(f'ℹ️  (Large file) {len(existing_arr)} games currently stored.')
                  except Exception as read_exc:
                      print(f'❌ Could not read existing PC.Games.json: {read_exc}')
                      sys.exit(1)
                  try:
                      existing_sha = get_blob_sha_via_tree(owner, repo, path, headers)
                      if existing_sha:
                          print(f'ℹ️  SHA via tree: {existing_sha[:7]}')
                  except Exception as tree_exc:
                      print(f'⚠️  Could not look up SHA via tree API: {tree_exc}')
              else:
                  print(f'❌ Unexpected HTTP {e.code} reading PC.Games.json')
                  sys.exit(1)

          # ── 5. Build set of AppIDs already in PC.Games.json ────────────────
          existing_appids = set()
          for g in existing_arr:
              aid = g.get('appid')
              if aid is not None:
                  existing_appids.add(int(aid))

          # ── 6. Determine truly new games ───────────────────────────────────
          new_games = [
              entry for appid, entry in steam_by_appid.items()
              if appid not in existing_appids
          ]
          # Sort by appid so additions are deterministic
          new_games.sort(key=lambda g: g['appid'])

          if not new_games:
              print('✅ No new Steam games found — PC.Games.json is already up to date.')
              sys.exit(0)

          print(f'🆕 {len(new_games)} new Steam game(s) to append.')

          # ── 7. Build updated games list and payload ────────────────────────
          updated_arr = list(existing_arr) + new_games
          payload_data = dict(existing_meta)
          payload_data['Platform'] = payload_data.get('Platform', 'PC')
          payload_data['source']   = payload_data.get(
              'source', 'https://github.com/dgibbs64/SteamCMD-AppID-List'
          )
          payload_data['Games'] = updated_arr

          commit_msg = (
              f'Add {len(new_games)} new Steam game(s) to PC.Games.json '
              f'(total: {len(updated_arr)})'
          )

          # ── 8. Write updated PC.Games.json via Git Data API ───────────────
          # PC.Games.json grows to ~33 MB compact (~50 MB pretty-printed); the
          # Contents API has a 1 MB limit so we use the Git Data API
          # (blob → tree → commit → ref). Compact JSON keeps the payload within
          # the blob API size limit.
          file_bytes = json.dumps(payload_data, separators=(',', ':'), ensure_ascii=False).encode('utf-8')
          file_b64   = base64.b64encode(file_bytes).decode('ascii')
          git_api    = f'https://api.github.com/repos/{owner}/{repo}'

          def git_request(url, method='GET', data_dict=None):
              data = json.dumps(data_dict).encode('utf-8') if data_dict is not None else None
              req  = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=REQUEST_TIMEOUT) as resp:
                  return json.loads(resp.read())

          try:
              print(f'   Creating blob ({len(file_bytes):,} bytes) …')
              blob        = git_request(f'{git_api}/git/blobs', 'POST', {'content': file_b64, 'encoding': 'base64'})
              blob_sha    = blob['sha']
              ref_data    = git_request(f'{git_api}/git/ref/heads/main')
              current_sha = ref_data['object']['sha']
              commit_data = git_request(f'{git_api}/git/commits/{current_sha}')
              base_tree   = commit_data['tree']['sha']
              new_tree    = git_request(f'{git_api}/git/trees', 'POST', {
                  'base_tree': base_tree,
                  'tree': [{'path': path, 'mode': '100644', 'type': 'blob', 'sha': blob_sha}],
              })
              new_commit  = git_request(f'{git_api}/git/commits', 'POST', {
                  'message':   commit_msg,
                  'tree':      new_tree['sha'],
                  'parents':   [current_sha],
                  'committer': {'name': 'Game.OS Admin', 'email': 'admin@gameos.local'},
              })
              git_request(f'{git_api}/git/refs/heads/main', 'PATCH', {'sha': new_commit['sha']})
              print(f'✅ PC.Games.json updated (commit: {new_commit["sha"][:7]})')
              print(f'   {len(new_games)} new game(s) added; {len(updated_arr)} total in {owner}/{repo}/{path}')
              for g in new_games[:10]:
                  print(f'   + [{g["appid"]}] {g["Title"]}')
              if len(new_games) > 10:
                  print(f'   … and {len(new_games) - 10} more')
          except urllib.error.HTTPError as e:
              body_text = e.read().decode('utf-8', errors='replace')
              print(f'❌ Failed to write PC.Games.json: HTTP {e.code}')
              print(body_text)
              sys.exit(1)
          PYEOF
