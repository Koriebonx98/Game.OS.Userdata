# Fix PC Games Compile Script in Games.Database
#
# The compile_pc_games.py script in Koriebonx98/Games.Database previously
# replaced the entire PC.Games.json (which contains ~153,000 Steam-catalogue
# games) with only the handful of manually-curated games stored under
# Data/PC/Games/*/info.json.  Every time an admin saved a PC game the Steam
# catalogue was silently wiped.
#
# This workflow writes a corrected version of compile_pc_games.py that MERGES
# curated games into the existing PC.Games.json rather than replacing it.
#
# Triggers:
#   • Automatic – whenever this workflow file is pushed to main
#   • Manual    – workflow_dispatch
#
# Required secret:
#   GAMES_DB_TOKEN – fine-grained PAT with Contents: Read and write on
#                    Koriebonx98/Games.Database.

name: Fix PC Games Compile Script

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-pc-games-compile.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  fix-compile-script:
    name: Patch compile_pc_games.py in Games.Database
    runs-on: ubuntu-latest

    steps:
      - name: Check for GAMES_DB_TOKEN
        run: |
          if [ -z "${{ secrets.GAMES_DB_TOKEN }}" ]; then
            echo "❌ GAMES_DB_TOKEN secret is not set."
            echo "   Add a fine-grained PAT with Contents: Read and write on"
            echo "   Koriebonx98/Games.Database as the GAMES_DB_TOKEN secret."
            exit 1
          fi
          echo "✅ GAMES_DB_TOKEN is present."

      - name: Write merge-based compile_pc_games.py to Games.Database
        env:
          GAMES_DB_TOKEN: ${{ secrets.GAMES_DB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, base64, os
          import urllib.request, urllib.error

          NEW_SCRIPT = r'''#!/usr/bin/env python3
          """
          Compile PC.Games.json by merging individual game info.json files from
          Data/PC/Games/ into the existing PC.Games.json.

          Each game must have its own directory under Data/PC/Games/<Title>/ containing
          an info.json file with the game's metadata.

          This script MERGES curated games into the existing PC.Games.json (which may
          contain a large Steam catalogue) rather than replacing it entirely.
          For each game found in Data/PC/Games/:
            - If a matching title already exists in PC.Games.json the curated metadata
              is overlaid onto that entry (preserving Steam catalogue fields).
            - If no match is found the game is appended as a custom entry.

          Usage:
              python compile_pc_games.py

          This script is also run automatically via GitHub Actions whenever files in
          Data/PC/Games/ are added, modified, or removed.
          """

          import json
          import os
          from pathlib import Path


          GAMES_DIR   = Path("Data/PC/Games")
          OUTPUT_FILE = Path("PC.Games.json")


          def _get_title(game):
              return game.get("Title") or game.get("title") or ""


          def compile_games():
              """Read all game info.json files and merge into PC.Games.json."""
              if not GAMES_DIR.is_dir():
                  print(f"Error: {GAMES_DIR} directory not found")
                  return False

              # ── 1. Load curated game entries ─────────────────────────────────────────
              curated = []
              errors  = 0

              for game_dir in sorted(GAMES_DIR.iterdir()):
                  if not game_dir.is_dir():
                      continue

                  info_file = game_dir / "info.json"
                  if not info_file.exists():
                      print(f"Warning: {game_dir.name}/ has no info.json, skipping")
                      continue

                  try:
                      with open(info_file, "r", encoding="utf-8") as f:
                          game_data = json.load(f)

                      if not isinstance(game_data, dict):
                          print(f"Warning: {info_file} does not contain a JSON object, skipping")
                          continue

                      if "Title" not in game_data:
                          print(
                              f"Warning: {info_file} has no 'Title' field; "
                              f"using directory name '{game_dir.name}'"
                          )
                          game_data["Title"] = game_dir.name

                      curated.append(game_data)
                      print(f"  Loaded curated: {game_data.get('Title', game_dir.name)}")

                  except json.JSONDecodeError as e:
                      print(f"Error: Could not parse {info_file}: {e}")
                      errors += 1
                  except OSError as e:
                      print(f"Error: Could not read {info_file}: {e}")
                      errors += 1

              if errors:
                  print(f"\n{errors} error(s) encountered. PC.Games.json was NOT updated.")
                  return False

              # ── 2. Load existing PC.Games.json ────────────────────────────────────────
              existing_games = []
              top_meta       = {}
              top_key        = "Games"
              is_bare_list   = False

              if OUTPUT_FILE.exists():
                  try:
                      with open(OUTPUT_FILE, "r", encoding="utf-8") as f:
                          existing_data = json.load(f)

                      if isinstance(existing_data, dict):
                          top_meta = {
                              k: v for k, v in existing_data.items()
                              if k not in ("Games", "games")
                          }
                          if "Games" in existing_data:
                              existing_games = existing_data["Games"]
                              top_key        = "Games"
                          elif "games" in existing_data:
                              existing_games = existing_data["games"]
                              top_key        = "games"
                      elif isinstance(existing_data, list):
                          existing_games = existing_data
                          is_bare_list   = True

                      print(
                          f"  Loaded {len(existing_games)} existing game(s) from {OUTPUT_FILE}"
                      )
                  except (json.JSONDecodeError, OSError) as e:
                      print(f"Warning: Could not read existing {OUTPUT_FILE}: {e}")
                      existing_games = []

              if not curated:
                  print(f"\nNo curated games found in {GAMES_DIR}. {OUTPUT_FILE} unchanged.")
                  return True

              # ── 3. Build a lookup of existing games by normalised title ───────────────
              games_by_title = {}
              for idx, g in enumerate(existing_games):
                  t = _get_title(g).lower()
                  if t:
                      games_by_title[t] = idx

              # ── 4. Merge curated games into the existing list ─────────────────────────
              for cg in curated:
                  name_lower = _get_title(cg).lower()
                  if name_lower in games_by_title:
                      idx  = games_by_title[name_lower]
                      base = dict(existing_games[idx])
                      # Preserve the canonical title from the existing entry before merging
                      canonical_title = base.get("Title")
                      base.update(cg)
                      if canonical_title:
                          base["Title"] = canonical_title
                      existing_games[idx] = base
                      print(f"  Updated: {cg.get('Title', name_lower)}")
                  else:
                      existing_games.append(cg)
                      games_by_title[name_lower] = len(existing_games) - 1
                      print(f"  Added:   {cg.get('Title', name_lower)}")

              # ── 5. Write merged output ────────────────────────────────────────────────
              if is_bare_list:
                  output = existing_games
              else:
                  output = {**top_meta, top_key: existing_games}

              try:
                  with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
                      json.dump(output, f, indent=2, ensure_ascii=False)
                  print(f"\nWrote {len(existing_games)} game(s) to {OUTPUT_FILE}")
              except OSError as e:
                  print(f"Error: Could not write {OUTPUT_FILE}: {e}")
                  return False

              return True


          if __name__ == "__main__":
              print(
                  f"Merging curated games from {GAMES_DIR}/*/info.json "
                  f"into {OUTPUT_FILE} ...\n"
              )
              success = compile_games()
              if not success:
                  raise SystemExit(1)
          '''

          token  = os.environ['GAMES_DB_TOKEN']
          owner  = 'Koriebonx98'
          repo   = 'Games.Database'
          path   = 'compile_pc_games.py'
          api    = f'https://api.github.com/repos/{owner}/{repo}/contents/{path}'

          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
          }

          # Get current file SHA
          req = urllib.request.Request(api, headers=headers)
          try:
              with urllib.request.urlopen(req) as resp:
                  file_meta = json.loads(resp.read())
              existing_sha = file_meta.get('sha')
              print(f'ℹ️  compile_pc_games.py exists (sha: {existing_sha[:7] if existing_sha else "unknown"})')
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  existing_sha = None
                  print('ℹ️  compile_pc_games.py does not exist yet — will create.')
              else:
                  raise

          encoded = base64.b64encode(NEW_SCRIPT.encode('utf-8')).decode('ascii')

          body = {
              'message': 'Fix compile_pc_games.py: merge curated games into existing catalog',
              'content': encoded,
              'committer': {
                  'name':  'Game.OS Admin',
                  'email': 'admin@gameos.local',
              },
          }
          if existing_sha:
              body['sha'] = existing_sha

          req = urllib.request.Request(
              api,
              data=json.dumps(body).encode('utf-8'),
              headers=headers,
              method='PUT',
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
              sha = result.get('content', {}).get('sha', '')[:7]
              print(f'✅ compile_pc_games.py updated (sha: {sha})')
          except urllib.error.HTTPError as e:
              body_text = e.read().decode('utf-8', errors='replace')
              print(f'❌ Failed to update compile_pc_games.py: HTTP {e.code}')
              print(body_text)
              raise SystemExit(1)
          PYEOF

      - name: Wait for Games.Database compile to settle
        run: |
          # Give compile_pc_games.yml in Games.Database time to finish running
          # with the newly-updated (merge-based) compile_pc_games.py before we
          # restore the Steam catalogue.  This prevents a race where the compile
          # job's commit lands after seed-pc-games has already read the current
          # HEAD SHA, which would cause seed's non-fast-forward PATCH to fail.
          # 180 s accounts for queue latency on busy GitHub Actions runners;
          # the compile job itself typically completes in under 60 s.
          echo "⏳ Waiting 180 s for Games.Database compile workflow to settle…"
          sleep 180
          echo "✅ Continuing."

      - name: Trigger Seed PC Games Database to restore full catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Dispatch the seed-pc-games workflow so the Steam catalogue is restored
          # now that compile_pc_games.py has been fixed.
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/seed-pc-games.yml/dispatches" \
            -d '{"ref":"main"}' \
            && echo "✅ Triggered seed-pc-games.yml workflow." \
            || echo "⚠️  Could not trigger seed-pc-games.yml (may require workflow permission)."
