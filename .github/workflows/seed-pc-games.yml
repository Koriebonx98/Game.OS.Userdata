# Seed / refresh PC.Games.json in the Games.Database repository
#
# Fetches the full Steam app list from dgibbs64/SteamCMD-AppID-List, filters
# it down to actual PC games (strips servers, SDKs, soundtracks, betas, etc.),
# then creates or updates PC.Games.json in Koriebonx98/Games.Database.
#
# Triggers:
#   • Automatic – whenever this workflow file is pushed to main (ensures it
#                 runs immediately after merge and on any future updates)
#   • Manual    – workflow_dispatch
#   • Weekly    – every Monday at 03:00 UTC (keeps the list fresh as new games
#                 are added to the Steam catalogue)
#
# Required secret:
#   GAMES_DB_TOKEN  – fine-grained PAT with Contents: Read and write on
#                     Koriebonx98/Games.Database.

name: Seed PC Games Database

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/seed-pc-games.yml'
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"   # every Monday at 03:00 UTC (GitHub Actions: 0=Sun, 1=Mon)

permissions:
  contents: read

jobs:
  seed:
    name: Create / update PC.Games.json from Steam catalogue
    runs-on: ubuntu-latest

    steps:
      - name: Check for GAMES_DB_TOKEN
        run: |
          if [ -z "${{ secrets.GAMES_DB_TOKEN }}" ]; then
            echo "❌ GAMES_DB_TOKEN secret is not set."
            echo "   Add a fine-grained PAT with Contents: Read and write on"
            echo "   Koriebonx98/Games.Database as the GAMES_DB_TOKEN secret."
            exit 1
          fi
          echo "✅ GAMES_DB_TOKEN is present."

      - name: Fetch Steam app list and update PC.Games.json
        env:
          GAMES_DB_TOKEN: ${{ secrets.GAMES_DB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, base64, os, sys
          import urllib.request, urllib.error

          REQUEST_TIMEOUT = 120   # seconds for all outbound HTTP calls

          # ── 1. Fetch the SteamCMD app-ID list ─────────────────────────────
          STEAM_LIST_URL = 'https://api.steampowered.com/ISteamApps/GetAppList/v2/'
          print(f'⬇️  Fetching Steam app list from {STEAM_LIST_URL} …')
          try:
              with urllib.request.urlopen(STEAM_LIST_URL, timeout=REQUEST_TIMEOUT) as resp:
                  steam_data = json.loads(resp.read())
          except Exception as exc:
              print(f'❌ Failed to fetch Steam app list: {exc}')
              sys.exit(1)

          all_apps = steam_data.get('applist', {}).get('apps', [])
          print(f'   Total entries in source list: {len(all_apps)}')

          # ── 2. Filter to actual games and build Steam catalogue ────────────
          # Keywords in the name that indicate non-game entries.
          # 'tool ' / ' tool' are space-anchored to avoid false-positive matches
          # on legitimate game titles that happen to contain the substring
          # (e.g. "Protocol", "Football", "Multi-Tool").
          SKIP_KEYWORDS = [
              'dedicated server',
              ' sdk',
              'source sdk',
              'soundtrack',
              ' ost',
              'playtest',
              'press review',
              'linux client',
              'winui',
              'steamcmd',
              'steam client',
              'tool ',
              ' tool',
              'beta test',
              'server beta',
              'dev kit',
              'devkit',
          ]

          steam_games   = []       # ordered list of seed-only game objects
          steam_by_name = {}       # name_lower → index in steam_games
          seen_names    = set()
          for app in all_apps:
              appid = app.get('appid')
              name  = app.get('name', '').strip()
              if not name or appid is None:
                  continue
              name_lower = name.lower()
              if any(kw in name_lower for kw in SKIP_KEYWORDS):
                  continue
              # Deduplicate by normalised title
              if name_lower in seen_names:
                  continue
              seen_names.add(name_lower)
              entry = {
                  'Title':   name,
                  'TitleID': str(appid),
                  'appid':   appid,
                  'image':   f'https://cdn.akamai.steamstatic.com/steam/apps/{appid}/header.jpg',
                  'stores':  [{'name': 'Steam', 'url': f'https://store.steampowered.com/app/{appid}/'}],
              }
              steam_by_name[name_lower] = len(steam_games)
              steam_games.append(entry)

          print(f'   Steam games after filtering: {len(steam_games)}')

          # ── 3. Set up GitHub API helpers ───────────────────────────────────
          token  = os.environ['GAMES_DB_TOKEN']
          owner  = 'Koriebonx98'
          repo   = 'Games.Database'
          path   = 'PC.Games.json'
          api    = f'https://api.github.com/repos/{owner}/{repo}/contents/{path}'
          raw_url = f'https://raw.githubusercontent.com/{owner}/{repo}/main/{path}'

          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
          }

          def get_blob_sha_via_tree(owner, repo, path, headers):
              """Return the blob SHA for *path* using the Git Trees API.
              Used as a fallback when the file is too large for the Contents API."""
              ref_url = f'https://api.github.com/repos/{owner}/{repo}/git/ref/heads/main'
              with urllib.request.urlopen(
                      urllib.request.Request(ref_url, headers=headers)) as r:
                  commit_sha = json.loads(r.read())['object']['sha']
              commit_url = (
                  f'https://api.github.com/repos/{owner}/{repo}/git/commits/{commit_sha}'
              )
              with urllib.request.urlopen(
                      urllib.request.Request(commit_url, headers=headers)) as r:
                  tree_sha = json.loads(r.read())['tree']['sha']
              tree_url = (
                  f'https://api.github.com/repos/{owner}/{repo}'
                  f'/git/trees/{tree_sha}?recursive=true'
              )
              with urllib.request.urlopen(
                      urllib.request.Request(tree_url, headers=headers)) as r:
                  tree = json.loads(r.read())
              for item in tree.get('tree', []):
                  if item.get('path') == path:
                      return item['sha']
              return None

          def extract_games_arr(data):
              """Normalise the games JSON into a flat list regardless of wrapper format."""
              if isinstance(data, dict):
                  return data.get('Games') or data.get('games') or []
              if isinstance(data, list):
                  return data
              return []

          def get_title(game):
              """Return the canonical title string from a game dict."""
              return game.get('Title') or game.get('title') or ''

          # ── 4. Read existing PC.Games.json and identify curated entries ────
          # A "curated" game is one that was manually added via the admin UI and
          # therefore has extra fields beyond the seed-only set
          # (Title, TitleID, appid, stores), OR is missing the 'appid' field
          # entirely (meaning it was never written by this seed workflow).
          # These entries must be preserved across seed runs.
          SEED_ONLY_FIELDS = {'Title', 'TitleID', 'appid', 'image', 'stores'}

          existing_sha  = None
          curated_games = []

          req = urllib.request.Request(api, headers=headers)
          try:
              with urllib.request.urlopen(req) as resp:
                  file_meta = json.loads(resp.read())
              existing_sha = file_meta.get('sha')
              # Inline content for files < 1 MB; larger files provide download_url
              if file_meta.get('content'):
                  existing_data = json.loads(
                      base64.b64decode(file_meta['content'].replace('\n', ''))
                  )
              else:
                  with urllib.request.urlopen(file_meta['download_url']) as r:
                      existing_data = json.loads(r.read())
              existing_arr = extract_games_arr(existing_data)
              for g in existing_arr:
                  is_seed_only = ('appid' in g and set(g.keys()) <= SEED_ONLY_FIELDS)
                  if not is_seed_only:
                      curated_games.append(g)
              print(
                  f'ℹ️  PC.Games.json exists (sha: {existing_sha[:7]}) — '
                  f'found {len(curated_games)} curated game(s) to preserve.'
              )
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print('ℹ️  PC.Games.json does not exist yet — will create.')
              elif e.code == 403:
                  # File too large for the Contents API — read via public raw URL
                  try:
                      with urllib.request.urlopen(raw_url, timeout=REQUEST_TIMEOUT) as r:
                          existing_data = json.loads(r.read())
                      existing_arr = extract_games_arr(existing_data)
                      for g in existing_arr:
                          is_seed_only = ('appid' in g and set(g.keys()) <= SEED_ONLY_FIELDS)
                          if not is_seed_only:
                              curated_games.append(g)
                      print(
                          f'ℹ️  (Large file) Found {len(curated_games)} curated game(s) to preserve.'
                      )
                  except Exception as read_exc:
                      print(f'⚠️  Could not read existing PC.Games.json content: {read_exc}')
                  try:
                      existing_sha = get_blob_sha_via_tree(owner, repo, path, headers)
                      if existing_sha:
                          print(f'ℹ️  SHA via tree: {existing_sha[:7]}')
                  except Exception as tree_exc:
                      print(f'⚠️  Could not look up SHA via tree API: {tree_exc}')
              else:
                  print(f'❌ Unexpected HTTP {e.code} checking for PC.Games.json')
                  sys.exit(1)

          # ── 5. Merge curated games into the Steam catalogue ────────────────
          # Start from the full Steam catalogue, then:
          #   • If a curated game title matches a Steam entry → overlay the curated
          #     metadata onto that entry (Steam's TitleID/appid/stores take precedence).
          #   • If a curated game has no Steam match → append it as a custom entry.
          games = list(steam_games)
          for cg in curated_games:
              name_lower = get_title(cg).lower()
              if name_lower in steam_by_name:
                  idx          = steam_by_name[name_lower]
                  steam_entry  = games[idx]
                  # Preserve curated metadata; Steam's canonical fields take precedence
                  games[idx] = {
                      **cg,
                      'Title':   steam_entry['Title'],
                      'TitleID': steam_entry['TitleID'],
                      'appid':   steam_entry['appid'],
                      'image':   steam_entry['image'],
                      'stores':  steam_entry['stores'],
                  }
              else:
                  # Not in the Steam catalogue — keep as a custom/non-Steam PC game
                  games.append(cg)

          if curated_games:
              print(f'   Total games after merging {len(curated_games)} curated entry/entries: {len(games)}')

          # ── 6. Build the payload ───────────────────────────────────────────
          pc_games_data = {
              'Platform': 'PC',
              'source': 'https://api.steampowered.com/ISteamApps/GetAppList/v2/',
              'Games': games,
          }

          # ── 7. Create or update PC.Games.json in Games.Database ───────────
          # PC.Games.json is ~33 MB compact (~50 MB pretty-printed), which exceeds
          # the GitHub Contents API 1 MB limit (HTTP 422) and would also exceed
          # the blob API limit as indented JSON.  We use the Git Data API with
          # compact JSON: blob → tree → commit → ref update.
          file_bytes = json.dumps(pc_games_data, separators=(',', ':'), ensure_ascii=False).encode('utf-8')
          file_b64   = base64.b64encode(file_bytes).decode('ascii')
          commit_msg = f'Update PC.Games.json from Steam catalogue ({len(games)} games)'
          git_api    = f'https://api.github.com/repos/{owner}/{repo}'

          def git_request(url, method='GET', data_dict=None):
              data = json.dumps(data_dict).encode('utf-8') if data_dict is not None else None
              req  = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          try:
              # 7a. Create a blob with the file content
              print(f'   Creating blob ({len(file_bytes):,} bytes) …')
              blob     = git_request(f'{git_api}/git/blobs', 'POST', {'content': file_b64, 'encoding': 'base64'})
              blob_sha = blob['sha']
              print(f'   Blob sha: {blob_sha[:7]}')

              # 7b. Get the current commit and its tree
              ref_data    = git_request(f'{git_api}/git/ref/heads/main')
              current_sha = ref_data['object']['sha']
              commit_data = git_request(f'{git_api}/git/commits/{current_sha}')
              base_tree   = commit_data['tree']['sha']

              # 7c. Create a new tree with the updated file
              new_tree     = git_request(f'{git_api}/git/trees', 'POST', {
                  'base_tree': base_tree,
                  'tree': [{'path': path, 'mode': '100644', 'type': 'blob', 'sha': blob_sha}],
              })
              new_tree_sha = new_tree['sha']

              # 7d. Create a new commit
              new_commit     = git_request(f'{git_api}/git/commits', 'POST', {
                  'message':   commit_msg,
                  'tree':      new_tree_sha,
                  'parents':   [current_sha],
                  'committer': {'name': 'Game.OS Admin', 'email': 'admin@gameos.local'},
              })
              new_commit_sha = new_commit['sha']

              # 7e. Update the branch ref
              git_request(f'{git_api}/git/refs/heads/main', 'PATCH', {'sha': new_commit_sha})

              print(f'✅ PC.Games.json updated successfully (commit: {new_commit_sha[:7]})')
              print(f'   {len(games)} games written to {owner}/{repo}/{path}')

          except urllib.error.HTTPError as e:
              body_text = e.read().decode('utf-8', errors='replace')
              print(f'❌ Failed to write PC.Games.json: HTTP {e.code}')
              print(body_text)
              sys.exit(1)
          PYEOF
