# screenshot-live.yml
#
# Takes real screenshots of the C# Avalonia Game.OS Launcher using a real
# Koriebonx98 account logged in against the live backend.
#
# Trigger:  workflow_dispatch  (run manually from the Actions tab)
#
# Required repository secrets:
#   DATA_REPO_TOKEN        — Fine-grained PAT for GitHub-direct mode fallback
#   GAMEOS_BACKEND_URL     — Deployed backend URL (e.g. https://gameos.up.railway.app)
#   GAMEOS_USERNAME        — Account username for the screenshot login
#   GAMEOS_PASSWORD        — Account password for the screenshot login
#   ADMIN_GAMEOS_PASSWORD  — (optional) Admin.GameOS password, defaults to GameOS2026
#
# What it does:
#   1. Injects DATA_REPO_TOKEN + GAMEOS_BACKEND_URL into the build
#   2. Builds GameLauncher for Linux
#   3. Starts the local backend (for fallback), OR uses the live GAMEOS_BACKEND_URL
#   4. Runs the launcher with --live-login on a headless Xvfb display
#   5. Captures one PNG per view (dashboard, library, store, friends, profile,
#      game detail, login) using Python mss
#   6. Commits and pushes the screenshots to Design/Game Launcher/v1.0.3/

name: Real Account Screenshots

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Game.OS username to log in with (leave blank to use GAMEOS_USERNAME secret)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  screenshot:
    name: Capture real-account screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python screenshot dependencies
        run: pip install mss Pillow

      - name: Install Xvfb and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb libgles2 libgl1 libice6 libsm6 \
            fonts-dejavu fonts-liberation ttf-ubuntu-font-family

      - name: Inject DATA_REPO_TOKEN into gameos-token.dat
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os
          token   = os.environ.get('DATA_REPO_TOKEN', '')
          XOR_KEY = b'GameOS_KEY'
          if token:
              tok_bytes = token.encode('utf-8')
              encoded = ''.join(
                  f'{b ^ XOR_KEY[i % len(XOR_KEY)]:02x}'
                  for i, b in enumerate(tok_bytes)
              )
              with open('GameLauncher/gameos-token.dat', 'w') as f:
                  f.write(encoded)
              print(f'✅ DATA_REPO_TOKEN injected ({len(encoded)} hex chars)')
          else:
              print('⚠  DATA_REPO_TOKEN not set — GitHub-direct mode disabled.')
          PYEOF

      - name: Inject GAMEOS_BACKEND_URL into gameos-backend.url
        env:
          GAMEOS_BACKEND_URL: ${{ secrets.GAMEOS_BACKEND_URL }}
        run: |
          python3 << 'PYEOF'
          import os
          url = os.environ.get('GAMEOS_BACKEND_URL', '').strip().rstrip('/')
          if url:
              with open('GameLauncher/gameos-backend.url', 'w') as f:
                  f.write(url)
              print(f'✅ Backend URL injected: {url}')
          else:
              print('ℹ  GAMEOS_BACKEND_URL not set — will start local backend.')
          PYEOF

      - name: Set up Node.js (for local backend fallback)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start local backend (if no GAMEOS_BACKEND_URL)
        id: backend
        env:
          GITHUB_TOKEN:          ${{ secrets.DATA_REPO_TOKEN }}
          REPO_OWNER:            Koriebonx98
          REPO_NAME:             Game.OS.Private.Data
          ADMIN_GAMEOS_PASSWORD: ${{ secrets.ADMIN_GAMEOS_PASSWORD || 'GameOS2026' }}
          PORT:                  3000
        run: |
          # Only start local backend if no external backend URL was injected
          if grep -q . GameLauncher/gameos-backend.url 2>/dev/null; then
            echo "✅ Using external backend — skipping local backend start."
            echo "LOCAL_BACKEND=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$GITHUB_TOKEN" ]; then
            echo "⚠  DATA_REPO_TOKEN not set — cannot start local backend."
            echo "   Set GAMEOS_BACKEND_URL or DATA_REPO_TOKEN as repository secrets."
            echo "LOCAL_BACKEND=false" >> "$GITHUB_ENV"
            exit 0
          fi

          cd backend
          npm ci --silent
          export TOKEN_HMAC_SECRET="$(openssl rand -hex 32)"
          nohup node index.js > /tmp/backend-screenshot.log 2>&1 &
          echo "$!" > /tmp/backend-screenshot.pid

          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ Local backend ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Patch the backend URL into gameos-backend.url so the app uses it
          echo "http://localhost:3000" > ../GameLauncher/gameos-backend.url
          echo "LOCAL_BACKEND=true" >> "$GITHUB_ENV"

      - name: Build GameLauncher (Linux)
        run: |
          dotnet build GameLauncher/GameLauncher.csproj -c Release
          echo "✅ Build successful"

      - name: Capture real-account screenshots on Xvfb
        env:
          GAMEOS_USERNAME: ${{ inputs.username != '' && inputs.username || secrets.GAMEOS_USERNAME }}
          GAMEOS_PASSWORD: ${{ secrets.GAMEOS_PASSWORD }}
          GAMEOS_BACKEND_URL: ${{ secrets.GAMEOS_BACKEND_URL }}
        run: |
          # Start virtual display
          Xvfb :99 -screen 0 1280x1400x24 &
          sleep 2

          EXE="GameLauncher/bin/Release/net8.0/GameLauncher"
          DEST="Design/Game Launcher/v1.0.3"
          mkdir -p "$DEST"

          # Helper: run app with --live-login, wait for UI to settle, grab screenshot
          # $1=page  $2=output_file  $3=wait_seconds
          # Login page needs 7s (no backend call).  Main pages need 8s (backend round-trip).
          # Game detail needs 9s (backend call + achievements async load).
          capture_live() {
            local page="$1" out="$2" wait="${3:-8}"
            DISPLAY=:99 GAMEOS_USERNAME="$GAMEOS_USERNAME" GAMEOS_PASSWORD="$GAMEOS_PASSWORD" \
              $EXE --live-login --page="$page" &
            local pid=$!
            sleep "$wait"
            DISPLAY=:99 python3 -c "
          import mss, mss.tools
          with mss.mss() as sct:
              img = sct.grab({'left':0,'top':0,'width':1280,'height':1350})
              mss.tools.to_png(img.rgb, img.size, output='$out')
              print('  Captured $page -> $out', img.size)
          "
            kill $pid 2>/dev/null || true
            sleep 1
          }

          # Login page — no --live-login so the login form is shown (no backend call, 7s)
          echo "=== Capturing login page ==="
          DISPLAY=:99 $EXE &
          LOGIN_PID=$!
          sleep 7
          DISPLAY=:99 python3 -c "
          import mss, mss.tools
          with mss.mss() as sct:
              img = sct.grab({'left':0,'top':0,'width':1280,'height':820})
              mss.tools.to_png(img.rgb, img.size, output='$DEST/screenshot_login.png')
              print('  Login captured:', img.size)
          "
          kill $LOGIN_PID 2>/dev/null || true
          sleep 1

          # Main pages — 8s each (app startup + backend login + page render)
          for page in dashboard library store friends profile; do
            echo "=== Capturing $page ==="
            capture_live "$page" "$DEST/screenshot_$page.png" 8
          done

          # Game detail — 9s (extra time for async achievements load after login)
          echo "=== Capturing game detail ==="
          capture_live "gamedetail" "$DEST/screenshot_gamedetail_youtube_achievements.png" 9

          echo "✅ All screenshots captured:"
          ls -lh "$DEST/"*.png

      - name: Stop local backend
        if: always() && env.LOCAL_BACKEND == 'true'
        run: |
          if [ -f /tmp/backend-screenshot.pid ]; then
            PID=$(cat /tmp/backend-screenshot.pid)
            kill "$PID" 2>/dev/null && echo "✅ Local backend (PID $PID) stopped" || true
          fi

      - name: Commit and push real screenshots
        run: |
          DEST="Design/Game Launcher/v1.0.3"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DEST"/*.png
          if git diff --cached --quiet; then
            echo "ℹ  No screenshot changes to commit."
          else
            git commit -m "screenshots: real account login via \`--live-login\` [skip ci]

          Captured by Real Account Screenshots workflow using GAMEOS_USERNAME
          account against the live Game.OS backend.  All views show actual
          library, achievements and friends data from the real account."
            git push
            echo "✅ Screenshots committed and pushed."
          fi
